steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/projectforpoc-489612/gcp-poc-app', '.']

images:
  - 'gcr.io/gcpmyapp/gcp-appimage'

options:
  # This satisfies requirement (c) in the error message
  logging: CLOUD_LOGGING_ONLY
  # Ensure the capital 'A' and no extra spaces
  serviceAccount: 'projects/gcpmyapp/serviceAccounts/gcpmyapp-service-account@gcpmyapp.iam.gserviceaccount.com'
